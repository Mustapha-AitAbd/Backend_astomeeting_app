<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Support – Syni</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      text-align: center;
    }

    .logo {
      font-size: 2rem;
      font-weight: 800;
      color: #667eea;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    .tagline {
      color: #999;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 12px;
    }

    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .contact-box {
      background: #f5f3ff;
      border: 2px solid #e0d9ff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 28px;
    }

    .contact-box .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      margin-bottom: 10px;
    }

    .contact-box a {
      font-size: 1.05rem;
      font-weight: 600;
      color: #667eea;
      text-decoration: none;
      word-break: break-all;
    }

    .contact-box a:hover {
      text-decoration: underline;
    }

    .btn {
      display: inline-block;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.88; }

    .footer-note {
      margin-top: 28px;
      font-size: 0.78rem;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Syni</div>
    <div class="tagline">We're here to help 💜</div>

    <h1>Support Center</h1>
    <p>
      Having an issue or need assistance?<br/>
      Our team is ready to help you. Just send us an email and we'll get back to you as soon as possible.
    </p>

    <div class="contact-box">
      <div class="label">📧 Contact us at</div>
      <a href="mailto:syniapp.team@gmail.com">syniapp.team@gmail.com</a>
    </div>

    <a class="btn" href="mailto:syniapp.team@gmail.com">Send us an email</a>

    <p class="footer-note">We typically respond within 24–48 hours.</p>
  </div>
</body>
</html>
